name: Update Workout Manifest

on:
  push:
    branches: [main]
    paths:
      - 'workouts/**'
      - 'WOdb/**'
      - 'pwa/scripts/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Debug - list files
        run: |
          ls -la
          echo "---"
          ls -la WOdb/ 2>/dev/null || echo "WOdb not found"

      - name: Create workouts directory and copy files
        run: |
          mkdir -p workouts
          if [ -d "WOdb/zwift_workouts_all_collections_ordered_Nov20" ]; then
            cp -r WOdb/zwift_workouts_all_collections_ordered_Nov20/* workouts/
          elif [ -d "WOdb" ]; then
            cp -r WOdb/* workouts/
          fi
          echo "Workouts directory:"
          ls workouts/ | head -5

      - name: Generate manifest
        run: python scripts/generate_manifest.py

      - name: Debug output
        run: |
          echo "Generated workouts.json:"
          head -30 workouts.json

      - name: Commit manifest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update workout manifest"
          file_pattern: "workouts.json"
