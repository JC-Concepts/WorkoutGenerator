name: Update Workout Manifest

on:
  push:
    branches: [main]
    paths:
      - 'workouts/**'
      - 'WOdb/**'
      - 'pwa/scripts/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create workouts directory if not exists
        run: |
          if [ ! -d "workouts" ]; then
            if [ -d "WOdb/zwift_workouts_all_collections_ordered_Nov20" ]; then
              cp -r WOdb/zwift_workouts_all_collections_ordered_Nov20 workouts
            fi
          fi

      - name: Generate manifest
        run: python scripts/generate_manifest.py

      - name: Commit manifest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update workout manifest"
          file_pattern: "workouts.json"
